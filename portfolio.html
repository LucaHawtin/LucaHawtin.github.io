<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luca Hawtin | Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:Segoe UI,Tahoma,sans-serif;background:#121212;color:#e0e0e0;line-height:1.7}
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    border-bottom: 1px solid rgba(255,255,255,0);
    transition:
        background-color 0.15s linear,
        backdrop-filter 0.15s linear,
        border-color 0.15s linear;
    z-index: 1000;
}
nav a{
    text-decoration:none;
    color:#ddd;
    margin-left:30px;
    font-weight:600;
    transition:color .25s;
}

nav a:hover{
    color:#90caf9;
}
.hero{height:92vh;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),url('roadbike.jpg') center/cover;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:4rem;color:#fff}.hero p{font-size:1.3rem;color:#ddd}
.container{max-width:1100px;margin:auto;padding:70px 24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:50px}
.stat,.card{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:24px}
.stat h3{color:#90caf9;font-size:2rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.card h2{color:#90caf9;margin-bottom:18px}.card p{margin-bottom:18px;color:#ccc}
.card img{width:100%;border-radius:8px;margin-top:18px}
.cta{text-align:center;padding:60px 0}.cta a{display:inline-block;background:#1976d2;color:#fff;text-decoration:none;padding:14px 28px;border-radius:8px}
@media(max-width:800px){.grid{grid-template-columns:1fr}.hero h1{font-size:2.8rem}nav{padding:16px;flex-wrap:wrap}}
</style></head>
